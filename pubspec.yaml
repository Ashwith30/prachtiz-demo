name: prachtiz_flutter
description: A responsive, premium clinical practice management dashboard migrated from Angular to Flutter.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  google_fonts: ^6.1.0
  go_router: ^13.0.0
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  intl: ^0.19.0
  fl_chart: ^0.66.0
  flutter_animate: ^4.5.0
  equatable: ^2.0.5
  camera: ^0.12.0+1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
